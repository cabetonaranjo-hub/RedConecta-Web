<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseñemos tu Ruta | RedConecta</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --azul-inst: #002D62; --azul-osc: #001B3D; --turq: #008C95; --turq-claro: #14AEB7; --gris-claro: #F5F7FA; --gris-medio: #D9E1E8; --blanco: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--azul-osc); color: var(--gris-claro); padding-top: 70px; }
        
        /* HEADER UNIFICADO */
        header { width: 100%; height: 70px; background-color: var(--blanco); display: flex; justify-content: space-between; align-items: center; padding: 0 5%; position: fixed; top: 0; z-index: 1000; border-bottom: 2px solid var(--turq); }
        nav { display: flex; gap: 20px; }
        nav a { color: var(--azul-inst); font-size: 13px; font-weight: 600; text-decoration: none; }
        .btn-cta { background-color: var(--turq); color: var(--blanco); padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 700; text-decoration: none; }

        section { padding: 60px 5%; max-width: 800px; margin: 0 auto; }
        .section-title { text-align: center; font-size: 32px; font-weight: 700; margin-bottom: 20px; color: var(--blanco); }
        .section-title span { color: var(--turq); }

        .form-container { background-color: var(--azul-inst); padding: 40px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; background: var(--azul-osc); border: 1px solid #334155; border-radius: 6px; color: var(--blanco); }
        
        .btn-primary { background-color: var(--turq); color: var(--blanco); padding: 14px; border: none; border-radius: 6px; width: 100%; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { background-color: var(--turq-claro); }
        
        .success-card { display: none; text-align: center; padding: 20px; }
        footer { background-color: #00142E; padding: 30px; text-align: center; color: var(--gris-medio); font-size: 13px; margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" style="height: 40px;">
        <nav>
            <a href="index.html">Home</a>
            <a href="direccion.html">Dirección</a>
            <a href="desarrollo.html">Desarrollo</a>
            <a href="optimizacion.html">Optimización</a>
            <a href="comunidad.html">Comunidad</a>
        </nav>
        <a href="ruta.html" class="btn-cta">Agendar Consejería</a>
    </header>

    <section>
        <h1 class="section-title">Diseñemos tu <span>Ruta</span></h1>
        <div class="form-container">
            <form id="formRutaConecta">
                <div class="form-group">
                    <label>Nombre de la Institución</label>
                    <input type="text" id="nombre_institucion" required placeholder="Ej. Institución Educativa Ejemplo">
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="correo_contacto" required placeholder="ejemplo@organizacion.com">
                </div>
                <div class="form-group">
                    <label>Línea de Interés</label>
                    <select id="linea_interes" required>
                        <option value="Dirección Estratégica">Dirección Estratégica</option>
                        <option value="Desarrollo Misional">Desarrollo Misional</option>
                        <option value="Optimización Operativa">Optimización Operativa</option>
                        <option value="Modelo CÉNIT">Modelo CÉNIT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Descripción del Desafío</label>
                    <textarea id="mensaje_solicitud" rows="4" required></textarea>
                </div>
                <button type="submit" id="btnEnviar" class="btn-primary">Enviar Solicitud</button>
            </form>
            <div id="successCard" class="success-card">
                <i class="fa-solid fa-circle-check" style="font-size: 50px; color: #34D399; margin-bottom: 20px;"></i>
                <h3>¡Solicitud Recibida!</h3>
                <p>Nos pondremos en contacto pronto para diseñar tu ruta.</p>
            </div>
        </div>
    </section>

    <footer><p>&copy; 2026 RedConecta. Todos los derechos reservados.</p></footer>

    <script>
        const SUPABASE_URL = "https://ptzhakjnnrvvaodhjavg.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable__IjBIUK_14QYjl7FqteJiQ_x2d7cRHV";

        document.getElementById('formRutaConecta').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "Conectando...";
            
            const payload = {
                nombre_institucion: document.getElementById('nombre_institucion').value,
                correo_contacto: document.getElementById('correo_contacto').value,
                linea_interes: document.getElementById('linea_interes').value,
                mensaje_solicitud: document.getElementById('mensaje_solicitud').value
            };

            const response = await fetch(`${SUPABASE_URL}/rest/v1/solicitudes`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                document.getElementById('formRutaConecta').style.display = "none";
                document.getElementById('successCard').style.display = "block";
            } else {
                alert("Error al conectar con Supabase. Inténtalo más tarde.");
                btn.disabled = false;
                btn.innerText = "Enviar Solicitud";
            }
        });
    </script>
</body>
</html>
